name: Frontend Cleanup

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup-workflow-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Delete old Frontend CI runs
        uses: Mattraks/delete-workflow-runs@5bf9a1dac5c4d041c029f0a8370ddf0c5cb5aeb7
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 5
          delete_workflow_pattern: Frontend CI
