<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cockpit</title>
  </head>
  <body>
    <div class="border-b border-border/70 bg-background/90 backdrop-blur-xl">
      <form
        id="backend-selector-form"
        class="mx-auto flex max-w-7xl flex-col gap-3 px-4 py-4 sm:px-6 lg:px-8"
      >
        <div class="space-y-1">
          <label
            for="backend-origin-input"
            class="text-[11px] font-semibold uppercase tracking-[0.18em] text-muted-foreground"
          >
            Backend instance
          </label>
          <p
            id="backend-selector-status"
            class="text-sm leading-relaxed text-muted-foreground"
            role="status"
            aria-live="polite"
          >
            Choose the backend origin before loading the management console.
          </p>
        </div>

        <div class="flex flex-col gap-3 lg:flex-row lg:items-center">
          <select
            id="backend-history-select"
            class="h-9 min-w-0 rounded-lg border border-input bg-background px-3 text-sm text-foreground outline-none transition-colors focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50 disabled:cursor-not-allowed disabled:opacity-50 lg:w-64"
            aria-label="Recent backend instances"
          >
            <option value="">Recent backends</option>
          </select>

          <input
            id="backend-origin-input"
            class="h-9 min-w-0 flex-1 rounded-lg border border-input bg-background px-3 text-sm text-foreground outline-none transition-colors placeholder:text-muted-foreground focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50"
            type="url"
            inputmode="url"
            spellcheck="false"
            autocomplete="off"
            placeholder="http://127.0.0.1:8080"
          />

          <input
            id="management-password-input"
            class="h-9 min-w-0 rounded-lg border border-input bg-background px-3 text-sm text-foreground outline-none transition-colors placeholder:text-muted-foreground focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50 lg:w-72"
            type="password"
            spellcheck="false"
            autocomplete="off"
            aria-label="Management password"
            placeholder="Management password"
          />

          <button
            id="backend-selector-submit"
            class="inline-flex h-9 shrink-0 items-center justify-center rounded-lg bg-primary px-4 text-sm font-medium text-primary-foreground transition-opacity hover:opacity-90 focus-visible:outline-none focus-visible:ring-3 focus-visible:ring-ring/50"
            type="submit"
          >
            Connect backend
          </button>
        </div>
      </form>
    </div>

    <div id="root" hidden></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
